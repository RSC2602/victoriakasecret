        <style>
            .heart {
                position: fixed;
                bottom: -50px;
                width: 20px;
                height: 20px;
                background: #c02472;
                transform: rotate(45deg);
                z-index: 10000;
                animation: floatUp 5s linear forwards;
            }
            .heart::before, .heart::after {
                content: "";
                position: absolute;
                width: 20px;
                height: 20px;
                background: #981557;
                border-radius: 50%;
            }
            .heart::before { top: -10px; left: 0; }
            .heart::after { left: -10px; top: 0; }
            @keyframes floatUp {
                to { bottom: 110vh; opacity: 0; }
            }
            #foundText {
                display: none;
                position: fixed;
                top: 50%;
                left: 51.5%;
                transform: translateX(-50%);
                font-size: 2.7rem;
                font-weight: bold;
                color: midnightblue;
                text-shadow: 3px 3px 0 #fff;
                z-index: 10001;
                text-align: center;
                width: 100%;
            }
            #foundText2 {
                display: none;
                position: fixed;
                top: 60%;
                left: 50%;
                transform: translateX(-50%);
                font-size: 1.7rem;
                font-weight: bold;
                color: maroon;
                text-shadow: 3px 3px 0 #fff;
                z-index: 10001;
                text-align: center;
                width: 100%;
            }
            #foundDialog {
                display: none;
                position: fixed;
                top: 80%;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10002;
                height: auto;
                min-height: 0;
                padding: 10px 15px;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                gap: 15px;
                background: rgba(255, 255, 255, 0.4);
                backdrop-filter: blur(8px);
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.5);
            }
            #goAgainBtn, #seeMoreBtn {
                font-size: 1rem;
                padding: 10px 15px;
                white-space: nowrap;
                text-align: center;
            }
            #seeMoreBtn {
                background-color: orange;
                color: white;
                font-size: 1rem;
                padding: 10px 40px;
                width: max-content;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: pulseSeeMore 2s infinite ease-in-out;
        }
        @keyframes pulseSeeMore {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px 5px rgba(255, 165, 0, 0.6); }
            }
            #fadeOverlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: black;
                z-index: 999999;
            opacity: 1;
                pointer-events: none;
                transition: opacity 1s ease-in-out;
            }
            .found-bg {
                background: linear-gradient(-45deg, #f9c0b0, #f4b3f4, #f1888c, #e180c2, #b25b98);
                background-size: 400% 400%;
                animation: gradientBG 5s ease infinite;
            }
            @keyframes gradientBG {
                0% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
                100% {
                    background-position: 0% 50%;
                }
            }
        #goBtn {
            animation: pulseGo 2s infinite ease-in-out;
        }
        @keyframes pulseGo {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 120, 231, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px 5px rgba(0, 120, 231, 0.4); }
        }
        </style>

        <script>
            setTimeout(function() {
                document.getElementById('goBtn').style.display = 'inline-block';
            }, 3000);
            
            // Smoothly fade in the page from black
            setTimeout(function() {
                document.getElementById('fadeOverlay').style.opacity = '0';
            }, 100);

            init();

            function fadeOutAndNavigate() {
                var overlay = document.getElementById('fadeOverlay');
                overlay.style.opacity = '1';
                overlay.style.pointerEvents = 'auto';
                setTimeout(function() {
                    window.location.href = 'okk.html?auth=1';
